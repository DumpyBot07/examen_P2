<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autenticación - Proyecto Parcial 2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Sistema de Autenticación</h1>
        <p>Proyecto Parcial 2 - Web 2</p>
      </header>

      <main>
        <!-- Sección de Registro -->
        <section class="section" id="registro-section">
          <h2>Creación de Usuario</h2>
          <form id="registro-form" class="form">
            <div class="form-group">
              <label for="nombre">Nombre:</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ej: Raúl Duarte"
                required
              />
            </div>

            <div class="form-group">
              <label for="username">Nombre de Usuario:</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Ej: ProfeDuarte97"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Contraseña:</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Contraseña segura"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary">Crear Usuario</button>
          </form>
        </section>

        <!-- Sección de Login -->
        <section class="section" id="login-section">
          <h2>Autenticar Usuario</h2>
          <form id="login-form" class="form">
            <div class="form-group">
              <label for="login-username">Nombre de Usuario:</label>
              <input
                type="text"
                id="login-username"
                name="username"
                placeholder="Ingresa tu username"
                required
              />
            </div>

            <div class="form-group">
              <label for="login-password">Contraseña:</label>
              <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Ingresa tu contraseña"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
          </form>
        </section>

        <!-- Sección de Información del Usuario -->
        <section class="section" id="usuario-section">
          <h2>Información del Usuario</h2>
          <button id="mostrar-info-btn" class="btn btn-secondary">
            Mostrar Información
          </button>

          <div id="usuario-info" class="usuario-info hidden">
            <div class="info-item">
              <span class="info-label">ID:</span>
              <span id="user-id" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Nombre:</span>
              <span id="user-nombre" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Username:</span>
              <span id="user-username" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Contraseña (hasheada):</span>
              <span id="user-password" class="info-value info-password">-</span>
            </div>
          </div>
        </section>
      </main>

      <!-- Alertas -->
      <div id="alert-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
